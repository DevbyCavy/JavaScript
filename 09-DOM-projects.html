<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOM Projects</title>
</head>

<body>
    <p>Youtube Subscribe Button</p>
    <button  onclick="
        subscribe();
    " class="js-subscribe-btn"
    >Subscribe</button>

    <p>Amazon Shipping Calculator</p>
    <input placeholder="Cost of shipping">
    <button onclick="
        calculateShipping();
    " class="js-cost" onkeydown="handleCostKeydown(event);">Calculate</button>
    <p class="js-total-cost"></p>

  <script>
    function handleCostKeydown(event){
        if(event.key === 'Enter'){
            calculateShipping();
        }
    }

    function calculateShipping(){
        const inputElement = document.querySelector('.js-cost');
        let cost = Number(inputElement.value);

        if (cost < 40) {
            cost += 10;
        }
    }

    document.querySelector('.js-total-cost')
    .innerHTML = `$${cost}`;

    function subscribe(){
        const btnElement = document.querySelector('.js-subscribe-btn');

        if(btnElement.innerText === 'Subscribe'){
            btnElement.innerHTML = 'Subscribed';
        } else {
            btnElement.innerHTML = 'Subscribe';
        }
    }
  </script>

</body>
</html>
