<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOM Projects</title>

  <style>
    body{
        font-family: arial;
    }
    .js-subscribe-btn{
        background-color: black;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 20px;
        margin-bottom: 20px;
        font-weight: bold;
        cursor: pointer;
    }
    .js-cost-input{
        padding: 10px 15px;
        font-size: 15px;
        border-radius: 3px;
    }
    .js-cost{
        padding: 12px 15px;
        border: none;
        background-color: green;
        color: white;
    }
    .is-subscribed{
        background-color: rgb(240, 240, 240);
        color: black;
    }
  </style>
</head>

<body>
    <p>Youtube Subscribe Button</p>
    <button onclick="
        subscribe();
    " class="js-subscribe-btn"
    >Subscribe</button>

    <p>Amazon Shipping Calculator</p>

    <input placeholder="Cost of shipping" 
    class="js-cost-input"
    onkeydown="
        handleCostKeydown(event);
    ">

    <button onclick="
        calculateShipping();
    " class="js-cost"
    >Calculate</button>

    <p class="js-total-cost"></p>

  <script>

    String(25);
    console.log('25' + 5);
    console.log('25' - 5);

    function handleCostKeydown(event){
        if (event.key === 'Enter'){
            calculateShipping();
        }
    }

    function calculateShipping(){
        const inputElement = document.querySelector('.js-cost-input');

        let cost = Number(inputElement.value);

        if (cost < 40) {
            cost = cost + 10;
        }

        document.querySelector('.js-total-cost')
        .innerHTML = `$${cost}`;
    }

    function subscribe(){
        const btnElement = document.querySelector('.js-subscribe-btn');

        if(btnElement.innerText === 'Subscribe'){
            btnElement.innerHTML = 'Subscribed';
            btnElement.classList.add('is-subscribed');
        } else {
            btnElement.innerHTML = 'Subscribe';
            btnElement.classList.remove('is-subscribed');
        }
    }
  </script>

</body>
</html>
