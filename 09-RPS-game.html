<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors</title>

</head>
<link rel="stylesheet" href="styles/10-RPS.css">

<body>
    <p class="title">Rock Paper Scissors</p>

    <button class="signBtn" onclick="
        playGame('rock');
    "><img src="images/rock-emoji.png"></button>

    <button class="signBtn" onclick="
        playGame('paper');
    "><img src="images/paper-emoji.png"></button>

    <button class="signBtn" onclick="
        playGame('scissors');
    "><img src="images/scissors-emoji.png"></button>

    <p class="js-result"></p>
    <p class="js-moves"></p>
    <p class="js-record"></p>

    <button class="reset-record-btn"
    onclick="
        record.wins = 0;
        record.loses = 0;
        record.draws = 0;
        updateRecordElement();
        localStorage.removeItem('record');
    ">Reset Score</button>

    <script src="scripts/10-RPS.js"></script>

</body>
</html>
